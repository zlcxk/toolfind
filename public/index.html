<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToolFind - 各类在线工具检索</title>
    <meta name="description" content="ToolFind 是一个以搜索为核心的在线工具导航站，帮助你快速查找图片处理、文档转换、开发调试、AI、设计、效率等实用工具。">
    <meta name="keywords" content="ToolFind,在线工具,工具导航,工具搜索,AI工具,图片处理,PDF工具,开发工具,设计工具">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ToolFind - 各类在线工具检索">
    <meta property="og:description" content="输入关键词，快速找到相关在线工具，并按分类清晰展示。">
    <meta property="og:site_name" content="ToolFind">
    <meta name="twitter:title" content="ToolFind - 各类在线工具检索">
    <meta name="twitter:description" content="搜索图片处理、文档转换、开发调试、AI、设计和效率工具。">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <script>
      if (window.location.search) document.body.dataset.mode = 'results';
    </script>

    <main class="home" id="home-view">
      <section class="hero shell">
        <h1 class="brand wordmark">ToolFind</h1>
        <p class="subtitle">输入需求，直接找到最相关的在线工具。</p>
        <form class="searchbar" data-search-form>
          <input data-search-input type="search" autocomplete="off" placeholder="搜索：压缩图片、JSON格式化、颜色提取...">
          <button class="button icon-button" type="submit" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.5 16.5 4 4"></path>
            </svg>
          </button>
        </form>
        <div class="chips" data-hot></div>
      </section>
      <footer class="site-footer">
        <p>© 2026 ToolFind. All rights reserved.</p>
        <p>本站仅提供在线工具导航与搜索，第三方工具服务由其运营方负责。</p>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">浙ICP备2025148305号-1</a>
      </footer>
    </main>

    <main id="results-view" class="hidden">
      <header class="topbar">
        <div class="topbar-inner shell">
          <a class="logo wordmark" href="/">ToolFind</a>
          <form class="searchbar" data-search-form>
            <input data-search-input type="search" autocomplete="off" placeholder="搜索工具">
            <button class="button icon-button" type="submit" aria-label="搜索">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m16.5 16.5 4 4"></path>
              </svg>
            </button>
          </form>
        </div>
      </header>
      <section class="shell">
        <p class="results-meta" data-meta></p>
        <div data-results></div>
      </section>
      <footer class="site-footer">
        <p>© 2026 ToolFind. All rights reserved.</p>
        <p>本站仅提供在线工具导航与搜索，第三方工具服务由其运营方负责。</p>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">浙ICP备2025148305号-1</a>
      </footer>
    </main>

    <script>
      if (window.location.search) {
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('results-view').classList.remove('hidden');
      }
    </script>
    <script src="/app.js"></script>
  </body>
</html>
